<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Date Calculator - Highlight N Consecutive Days After Any Selected Date </title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            padding: 24px 20px 32px 20px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 1.7rem;
            color: #2d3748;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #4a5568;
            margin-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 28px;
        }
        .date-box {
            background: white;
            border-radius: 28px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #cbd5e0;
            flex: 1;
            min-width: 200px;
        }
        .date-box label {
            font-weight: 600;
            color: #2c5282;
        }
        input[type="date"] {
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 10px 5px;
            font-weight: 500;
            color: #1a202c;
            outline: none;
            cursor: pointer;
            flex: 1;
        }
        .days-slider {
            flex: 1;
            min-width: 200px;
            background: white;
            border-radius: 40px;
            padding: 5px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #cbd5e0;
        }
        .days-slider span {
            font-weight: bold;
            color: #2b6cb0;
        }
        input[type="range"] {
            flex: 1;
            cursor: pointer;
            accent-color: #764ba2;
        }
        .days-value {
            background: #764ba2;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            min-width: 65px;
            text-align: center;
        }
        .calendar {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #e9ecef;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-top: 15px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .calendar-header button {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .calendar-header button:hover {
            background: #cbd5e0;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f1f5f9;
            text-align: center;
            font-weight: 700;
            color: #334155;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .dates-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            padding: 16px 12px;
            background: white;
        }
        .date-cell {
            text-align: center;
            padding: 10px 4px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.1s linear;
            color: #1e293b;
            cursor: default;
        }
        .date-cell.other-month {
            color: #94a3b8;
            background: transparent;
        }
        .date-cell.highlight {
            background: #fbbf24;
            color: #1e293b;
            font-weight: 800;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .date-cell.base-date {
            border: 3px solid #3b82f6;
            background: #eff6ff;
            font-weight: 800;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 28px;
            font-size: 0.9rem;
        }
        .highlight-count {
            background: #fbbf24;
            padding: 5px 14px;
            border-radius: 26px;
            font-weight: bold;
            color: #2d3748;
        }
        .base-date-info {
            font-weight: 600;
            color: #0f172a;
        }
        footer {
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
            color: #718096;
        }
        @media (max-width: 480px) {
            .container { padding: 18px; }
            .date-cell { font-size: 0.75rem; padding: 8px 2px; }
            .weekdays { font-size: 0.7rem; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📅 डेट कैलकुलेटर
    </h1>
    <div class="sub">✅ कोई भी तारीख (Past/Future) चुनें → अगले N दिन हाइलाइट होंगे</div>

    <div class="input-group">
        <div class="date-box">
            <label>📌 आधार तारीख:</label>
            <input type="date" id="startDateInput">
        </div>
        <div class="days-slider">
            <span>⏩ आगे के दिन:</span>
            <input type="range" id="daysRange" min="1" max="60" value="10" step="1">
            <div class="days-value" id="daysValueDisplay">10 दिन</div>
        </div>
    </div>

    <div class="calendar">
        <div class="calendar-header">
            <button id="prevMonthBtn">◀ पिछला महीना</button>
            <h3 id="monthYearDisplay" style="margin:0; font-weight:600;">मई 2026</h3>
            <button id="nextMonthBtn">अगला महीना ▶</button>
        </div>
        <div class="weekdays">
            <div>रवि</div><div>सोम</div><div>मंगल</div><div>बुध</div><div>गुरु</div><div>शुक्र</div><div>शनि</div>
        </div>
        <div class="dates-grid" id="datesGrid"></div>
    </div>

    <div class="info-bar">
        <div class="base-date-info" id="infoSelectedDate">📌 आधार तिथि: --</div>
        <div class="highlight-count" id="highlightInfo">✨ हाइलाइटेड दिन: --</div>
    </div>
    <footer>💡 नीली बॉर्डर = आपकी चुनी हुई आधार तिथि | 🟡 पीला = उसके अगले N दिन</footer>
</div>

<script>
    (function() {
        // DOM Elements
        const startDateInput = document.getElementById('startDateInput');
        const daysRange = document.getElementById('daysRange');
        const daysValueDisplay = document.getElementById('daysValueDisplay');
        const datesGrid = document.getElementById('datesGrid');
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const infoSelectedDate = document.getElementById('infoSelectedDate');
        const highlightInfo = document.getElementById('highlightInfo');

        // State
        let currentDisplayDate = new Date();  // calendar view ka month/year
        let baseDate = new Date();             // user ne jo date select ki (past/future dono possible)
        let daysOffset = 10;                   // kitne aage ke days highlight karne hain

        // Helper: YYYY-MM-DD format
        function formatDateToYMD(date) {
            let year = date.getFullYear();
            let month = String(date.getMonth() + 1).padStart(2, '0');
            let day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Base date set karna (kisi bhi date ke liye)
        function setBaseDateFromInput() {
            let dateVal = startDateInput.value;
            if (dateVal) {
                let parts = dateVal.split('-');
                if(parts.length === 3) {
                    let newBase = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
                    if(!isNaN(newBase.getTime())) {
                        baseDate = newBase;
                    } else {
                        baseDate = new Date();
                    }
                } else {
                    baseDate = new Date();
                }
            } else {
                baseDate = new Date();
            }
            baseDate.setHours(0,0,0,0);
            if(startDateInput.value !== formatDateToYMD(baseDate)) {
                startDateInput.value = formatDateToYMD(baseDate);
            }
        }

        // Check karo ki koi date highlight range me hai ya nahi (baseDate ke exactly next daysOffset days tak)
        function isDateInHighlightRange(checkDate) {
            let check = new Date(checkDate);
            check.setHours(0,0,0,0);
            let base = new Date(baseDate);
            base.setHours(0,0,0,0);
            
            let diffTime = check.getTime() - base.getTime();
            let diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            // Highlight sirf agar diffDays >= 1 aur diffDays <= daysOffset
            return (diffDays >= 1 && diffDays <= daysOffset);
        }

        // Kya ye date exactly baseDate hai?
        function isBaseDate(checkDate) {
            let check = new Date(checkDate);
            let base = new Date(baseDate);
            return check.toDateString() === base.toDateString();
        }

        // Calendar render karna
        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            
            const firstDayOfMonth = new Date(year, month, 1);
            const startWeekday = firstDayOfMonth.getDay(); // 0 = Sunday
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const prevMonthDate = new Date(year, month, 0);
            const daysInPrevMonth = prevMonthDate.getDate();
            
            let gridCells = [];
            const totalCells = 42;
            
            for(let i = 0; i < totalCells; i++) {
                let cellDateObj;
                let isCurrentMonth = true;
                let dayNumber;
                
                if(i < startWeekday) {
                    // Previous month ka cell
                    let prevDay = daysInPrevMonth - (startWeekday - i) + 1;
                    dayNumber = prevDay;
                    let prevYear = (month === 0) ? year - 1 : year;
                    let prevMonth = (month === 0) ? 11 : month - 1;
                    cellDateObj = new Date(prevYear, prevMonth, dayNumber);
                    isCurrentMonth = false;
                } 
                else if(i >= startWeekday + daysInMonth) {
                    // Next month ka cell
                    let nextDay = i - (startWeekday + daysInMonth) + 1;
                    dayNumber = nextDay;
                    let nextYear = (month === 11) ? year + 1 : year;
                    let nextMonth = (month === 11) ? 0 : month + 1;
                    cellDateObj = new Date(nextYear, nextMonth, dayNumber);
                    isCurrentMonth = false;
                }
                else {
                    // Current month ka cell
                    dayNumber = i - startWeekday + 1;
                    cellDateObj = new Date(year, month, dayNumber);
                    isCurrentMonth = true;
                }
                
                // CSS classes assign karna
                let cellClasses = ['date-cell'];
                if(!isCurrentMonth) cellClasses.push('other-month');
                
                if(isDateInHighlightRange(cellDateObj)) {
                    cellClasses.push('highlight');
                }
                if(isBaseDate(cellDateObj)) {
                    cellClasses.push('base-date');
                }
                
                let dateNumber = cellDateObj.getDate();
                let cellHtml = `<div class="${cellClasses.join(' ')}">${dateNumber}</div>`;
                gridCells.push(cellHtml);
            }
            
            // Month/Year display update
            const monthNames = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितंबर', 'अक्टूबर', 'नवंबर', 'दिसंबर'];
            monthYearDisplay.innerHTML = `${monthNames[month]} ${year}`;
            datesGrid.innerHTML = gridCells.join('');
        }

        // Poori UI refresh karna (info bar + calendar)
        function refreshUI() {
            // Info bar update
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            let baseDateStr = baseDate.toLocaleDateString('hi-IN', options);
            infoSelectedDate.innerHTML = `📌 आधार तिथि: ${baseDateStr}`;
            highlightInfo.innerHTML = `✨ अगले ${daysOffset} दिन हाइलाइटेड (आधार तिथि के बाद)`;
            
            renderCalendar();
        }

        // Days offset change hone par
        function updateDaysOffset() {
            daysOffset = parseInt(daysRange.value, 10);
            daysValueDisplay.innerText = `${daysOffset} दिन`;
            refreshUI();
        }

        // Base date change hone par (user ne date picker se koi bhi date select ki - past ya future)
        function onBaseDateChange() {
            let newDateStr = startDateInput.value;
            if(newDateStr) {
                let parsed = new Date(newDateStr);
                if(!isNaN(parsed.getTime())) {
                    baseDate = parsed;
                    baseDate.setHours(0,0,0,0);
                } else {
                    baseDate = new Date();
                    baseDate.setHours(0,0,0,0);
                    startDateInput.value = formatDateToYMD(baseDate);
                }
            } else {
                baseDate = new Date();
                baseDate.setHours(0,0,0,0);
                startDateInput.value = formatDateToYMD(baseDate);
            }
            // Calendar view ko base date ke month pe le jaate hain better UX ke liye
            currentDisplayDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
            refreshUI();
        }
        
        // Previous month button
        function goPrevMonth() {
            let newMonth = currentDisplayDate.getMonth() - 1;
            let newYear = currentDisplayDate.getFullYear();
            if(newMonth < 0) {
                newMonth = 11;
                newYear--;
            }
            currentDisplayDate = new Date(newYear, newMonth, 1);
            renderCalendar();
        }
        
        // Next month button
        function goNextMonth() {
            let newMonth = currentDisplayDate.getMonth() + 1;
            let newYear = currentDisplayDate.getFullYear();
            if(newMonth > 11) {
                newMonth = 0;
                newYear++;
            }
            currentDisplayDate = new Date(newYear, newMonth, 1);
            renderCalendar();
        }
        
        // Initialize tool
        function init() {
            // Default: Aaj ki date lete hain, but user kuch bhi select kar sakta hai
            // Sirf example ke liye nahi, real current date set karte hain
            const today = new Date();
            today.setHours(0,0,0,0);
            baseDate = new Date(today);
            currentDisplayDate = new Date(today.getFullYear(), today.getMonth(), 1);
            daysOffset = 10;
            daysRange.value = 10;
            daysValueDisplay.innerText = "10 दिन";
            startDateInput.value = formatDateToYMD(baseDate);
            
            // Event listeners
            startDateInput.addEventListener('change', onBaseDateChange);
            daysRange.addEventListener('input', function(e) {
                daysOffset = parseInt(e.target.value, 10);
                daysValueDisplay.innerText = `${daysOffset} दिन`;
                refreshUI();
            });
            prevMonthBtn.addEventListener('click', goPrevMonth);
            nextMonthBtn.addEventListener('click', goNextMonth);
            
            // Final render
            refreshUI();
        }
        
        init();
    })();
</script>
</body>
</html>
